<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B2B"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" fill="#050508" rx="80"/>
  <!-- Glow orbs -->
  <circle cx="130" cy="160" r="100" fill="#FF6B2B" opacity="0.12" filter="url(#blur)"/>
  <circle cx="270" cy="240" r="100" fill="#7B61FF" opacity="0.15" filter="url(#blur)"/>
  <!-- Border gradient ring -->
  <rect width="400" height="400" fill="none" rx="80" stroke="url(#g1)" stroke-width="2" opacity="0.4"/>

  <!-- Big centered "N" lettermark with gradient -->
  <text x="200" y="262" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="200" fill="url(#g1)" text-anchor="middle" letter-spacing="-6" opacity="0.9">N</text>

  <!-- Subtle dot grid overlay -->
  <g opacity="0.07">
    <circle cx="80" cy="80" r="2" fill="white"/><circle cx="160" cy="80" r="2" fill="white"/><circle cx="240" cy="80" r="2" fill="white"/><circle cx="320" cy="80" r="2" fill="white"/>
    <circle cx="80" cy="160" r="2" fill="white"/><circle cx="320" cy="160" r="2" fill="white"/>
    <circle cx="80" cy="240" r="2" fill="white"/><circle cx="320" cy="240" r="2" fill="white"/>
    <circle cx="80" cy="320" r="2" fill="white"/><circle cx="160" cy="320" r="2" fill="white"/><circle cx="240" cy="320" r="2" fill="white"/><circle cx="320" cy="320" r="2" fill="white"/>
  </g>

  <!-- Small node cluster top right -->
  <g transform="translate(290, 110)" filter="url(#glow)" opacity="0.7">
    <line x1="-30" y1="-15" x2="0" y2="0" stroke="url(#g1)" stroke-width="1.5"/>
    <line x1="-30" y1="15" x2="0" y2="0" stroke="url(#g1)" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="30" y2="-10" stroke="url(#g1)" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="30" y2="10" stroke="url(#g1)" stroke-width="1.5"/>
    <circle cx="-30" cy="-15" r="4" fill="#7B61FF"/><circle cx="-30" cy="15" r="4" fill="#7B61FF"/>
    <circle cx="0" cy="0" r="6" fill="url(#g1)"/>
    <circle cx="30" cy="-10" r="4" fill="#FF6B2B"/><circle cx="30" cy="10" r="4" fill="#FF6B2B"/>
  </g>

  <!-- Tagline -->
  <text x="200" y="358" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="5">NEURALFLOW AI</text>
</svg>
